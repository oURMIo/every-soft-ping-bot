name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build -x test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-app
          path: build/quarkus-app/
          retention-days: 1

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/
          retention-days: 7

  startup:
    name: Startup check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build application
        run: ./gradlew build -x test

      - name: Start application and verify
        run: |
          java -jar build/quarkus-app/quarkus-run.jar &
          APP_PID=$!

          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/hello | grep -q "200"; then
              echo "Application started successfully"
              kill $APP_PID
              exit 0
            fi
            sleep 2
          done

          echo "Application failed to start within 60 seconds"
          kill $APP_PID 2>/dev/null
          exit 1
        env:
          BOT_TOKEN: fake-token-for-ci
          QUARKUS_DATASOURCE_DB_KIND: h2
          QUARKUS_DATASOURCE_JDBC_URL: "jdbc:h2:mem:cidb;DB_CLOSE_DELAY=-1"
          QUARKUS_DATASOURCE_USERNAME: sa
          QUARKUS_DATASOURCE_PASSWORD: ""
          QUARKUS_HIBERNATE_ORM_SCHEMA_MANAGEMENT_STRATEGY: update
